<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayesian Network - Interactive</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.js"></script>
    <link href="https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.css" rel="stylesheet" type="text/css">
    <script src="network-data.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fb; height: 100vh; overflow: hidden; }
        .app-container { display: flex; height: 100vh; width: 100%; }

        .graph-panel {
            flex: 1 1 auto;
            min-width: 0;
            height: 100vh;
            background:
                linear-gradient(#fbfdffdd, #fbfdffdd),
                radial-gradient(circle at 1px 1px, #d9e3ee 1px, transparent 0);
            background-size: auto, 40px 40px;
            position: relative;
        }
        #network { width: 100%; height: 100%; }

        .graph-hint {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.78); color: white; padding: 8px 18px; border-radius: 18px;
            font-size: 13px; pointer-events: none; z-index: 10;
        }

        .sidebar {
            flex: 0 0 320px;
            min-width: 300px;
            max-width: 340px;
            height: 100vh;
            background: #f8fafc;
            border-left: 1px solid #e2e8f0;
            padding: 24px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .sidebar .sub {
            font-size: 13px;
            color: #6a7a9a;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 12px;
        }

        .evidence-section { background: white; border-radius: 8px; padding: 16px; box-shadow: 0 2px 8px rgba(15,23,42,0.04); margin-bottom: 16px; }
        .evidence-section h3 { font-size: 14px; color: #2d3a5a; margin-bottom: 10px; }
        .evidence-item { display: flex; justify-content: space-between; align-items: center; background: #f1f5f9; padding: 6px 12px; border-radius: 6px; margin-bottom: 6px; font-size: 13px; gap: 10px; }
        .evidence-item .node-name { font-weight: 600; color: #1a2a4a; }
        .evidence-item .state { color: #0f7b3a; background: #d1fae5; padding: 0 8px; border-radius: 4px; }
        .evidence-item .clear-ev { color: #b91c1c; cursor: pointer; font-weight: bold; margin-left: 10px; }
        .no-evidence { color: #8a9aaa; font-size: 13px; }

        .result-section { flex: 1; background: white; border-radius: 8px; padding: 16px; box-shadow: 0 2px 8px rgba(15,23,42,0.04); overflow-y: auto; }
        .result-section h3 { font-size: 14px; color: #2d3a5a; margin-bottom: 10px; }
        .result-item { margin-bottom: 14px; }
        .result-item .r-node-name {
            font-weight: 600;
            color: #1a2a4a;
            font-size: 14px;
            margin-bottom: 4px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            transition: background 0.2s;
        }
        .result-item .r-node-name:hover { background: #dbeafe; }
        .result-item .r-node-name .click-hint {
            font-weight: 400;
            color: #6a7a9a;
            font-size: 11px;
            margin-left: 8px;
        }
        .prob-row { display: flex; align-items: center; margin: 2px 0; }
        .prob-label { width: 86px; font-size: 12px; color: #4a5a7a; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .prob-track { flex: 1; background: #e8edf4; border-radius: 4px; height: 16px; overflow: hidden; }
        .prob-fill { height: 100%; background: #4a7cf7; border-radius: 4px; transition: width 0.3s ease; min-width: 2px; }
        .prob-value { width: 60px; text-align: right; font-size: 12px; color: #4a5a7a; flex-shrink: 0; margin-left: 8px; }

        .btn-clear-all { background: #e2e8f0; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; color: #2d3a5a; margin-top: 10px; width: 100%; }
        .btn-clear-all:hover { background: #cbd5e1; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: white; border-radius: 8px; padding: 30px; min-width: 300px; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal-box h3 { margin-bottom: 16px; color: #1a2a4a; }
        .modal-box .state-btn { display: block; width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #e2e8f0; border-radius: 8px; background: white; cursor: pointer; font-size: 14px; text-align: left; transition: 0.2s; }
        .modal-box .state-btn:hover { background: #e8edf4; border-color: #4a7cf7; }
        .modal-box .close-btn { margin-top: 10px; color: #6a7a9a; cursor: pointer; text-align: center; }

        @media (max-width: 900px) {
            body { overflow: auto; }
            .app-container { flex-direction: column; height: auto; min-height: 100vh; }
            .graph-panel { height: 68vh; min-height: 520px; flex: none; }
            .sidebar { max-width: none; width: 100%; height: auto; min-height: 32vh; border-left: none; border-top: 1px solid #e2e8f0; }
            .graph-hint { top: 12px; width: calc(100% - 32px); text-align: center; font-size: 12px; }
        }

        @media (max-width: 560px) {
            .graph-panel { height: 64vh; min-height: 460px; }
            .sidebar { padding: 16px 14px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="graph-panel">
            <div id="network"></div>
            <div class="graph-hint">Click any node to set evidence. Every node shows all probabilities.</div>
        </div>

        <div class="sidebar">
            <div class="sub">Click a node to set evidence. Probabilities update automatically.</div>

            <div class="evidence-section">
                <h3>Current Evidence</h3>
                <div id="evidence-list"><span class="no-evidence">No evidence</span></div>
                <button class="btn-clear-all" onclick="clearAllEvidence()">Clear All Evidence</button>
            </div>

            <div class="result-section" id="result-section">
                <h3>Posterior Probabilities</h3>
                <div id="result-container"><span style="color:#8a9aaa;">Waiting for inference...</span></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <h3 id="modal-node-title">Set Evidence</h3>
            <div id="modal-states"></div>
            <div class="close-btn" onclick="closeModal()">Cancel</div>
        </div>
    </div>

    <script>
        let allNodesInfo = {};
        let network = null;
        let nodesDataSet = null;
        let edgesDataSet = null;
        let currentEvidence = {};
        let lastResults = {};
        let selectedNodeId = null;
        let graphStructure = null;
        let resizeTimer = null;
        const BASE_NODE_FONT_SIZE = 14;
        const BASE_PPCM_FONT_SIZE = 16;
        const NODE_WIDTH_MIN = 180;
        const NODE_WIDTH_MAX = 300;
        const PPCM_WIDTH_MIN = 220;
        const PPCM_WIDTH_MAX = 330;
        const NODE_HEIGHT_MIN = 92;
        const NODE_HEIGHT_MAX = 150;
        const PPCM_HEIGHT_MIN = 106;
        const PPCM_HEIGHT_MAX = 164;

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function isPpcmNode(nodeId) {
            const name = allNodesInfo[nodeId]?.name || nodeId;
            return nodeId.toLowerCase() === 'ppcm' || name.toLowerCase() === 'ppcm';
        }

        function hasStaticData() {
            return typeof window.BAYES_DATA !== 'undefined';
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function escapeJsString(value) {
            return String(value).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        }

        function formatOutcomeLabel(value) {
            return String(value).replace(/_/g, ' ');
        }

        function measureTextUnits(value) {
            let units = 0;
            for (const char of String(value)) {
                const code = char.charCodeAt(0);
                if (code > 255) units += 1.7;
                else if (char === ' ') units += 0.36;
                else if ('ilI.,:;|'.includes(char)) units += 0.35;
                else if ('MW@%'.includes(char)) units += 1.04;
                else units += 0.68;
            }
            return units;
        }

        function getOrderedResultNodeIds(data) {
            const ids = Object.keys(data);
            const ppcmIds = ids.filter(isPpcmNode);
            const otherIds = ids.filter(id => !isPpcmNode(id));
            return [...otherIds, ...ppcmIds];
        }

        function getOutcomeEntries(nodeId, probs) {
            const configuredOutcomes = allNodesInfo[nodeId]?.outcomes || [];
            const entries = configuredOutcomes
                .filter(outcome => Object.prototype.hasOwnProperty.call(probs, outcome))
                .map(outcome => [outcome, probs[outcome]]);

            for (const [outcome, probability] of Object.entries(probs)) {
                if (!configuredOutcomes.includes(outcome)) {
                    entries.push([outcome, probability]);
                }
            }
            return entries;
        }

        function getNodeName(nodeId) {
            return allNodesInfo[nodeId]?.name || nodeId;
        }

        function getProbabilityLine(outcome, probability) {
            const value = probability === null || probability === undefined ? 0.999 : Number(probability) || 0;
            return `${formatOutcomeLabel(outcome)} ${(value * 100).toFixed(1)}%`;
        }

        function getSizingEntries(nodeId, probs) {
            if (probs && !probs.error) return getOutcomeEntries(nodeId, probs);
            return (allNodesInfo[nodeId]?.outcomes || []).map(outcome => [outcome, 0.999]);
        }

        function getOutcomeRows(nodeId, probs) {
            const entries = getSizingEntries(nodeId, probs);
            const rows = [];
            const rowLimit = isPpcmNode(nodeId) ? 30 : 34;

            for (let index = 0; index < entries.length; index += 2) {
                const pair = entries.slice(index, index + 2)
                    .map(([outcome, probability]) => getProbabilityLine(outcome, probability));
                const combined = pair.join(' / ');

                if (pair.length === 2 && measureTextUnits(combined) > rowLimit) {
                    rows.push(pair[0], pair[1]);
                } else {
                    rows.push(combined);
                }
            }

            return rows;
        }

        function getNodeLabelLines(nodeId, probs) {
            const lines = [getNodeName(nodeId), ...getOutcomeRows(nodeId, probs)];
            if (currentEvidence[nodeId]) {
                lines.push(`Evidence: ${formatOutcomeLabel(currentEvidence[nodeId])}`);
            }
            return lines;
        }

        function getNodeSizeProfile(nodeId, probs = lastResults[nodeId]) {
            const isPpcm = isPpcmNode(nodeId);
            const lines = getNodeLabelLines(nodeId, probs);
            const longestLineUnits = Math.max(...lines.map(measureTextUnits), 1);
            const baseFontSize = isPpcm ? BASE_PPCM_FONT_SIZE : BASE_NODE_FONT_SIZE;
            const horizontalPadding = isPpcm ? 46 : 40;
            const verticalPadding = isPpcm ? 34 : 28;
            const minWidth = isPpcm ? PPCM_WIDTH_MIN : NODE_WIDTH_MIN;
            const maxWidth = isPpcm ? PPCM_WIDTH_MAX : NODE_WIDTH_MAX;
            const minHeight = isPpcm ? PPCM_HEIGHT_MIN : NODE_HEIGHT_MIN;
            const maxHeight = isPpcm ? PPCM_HEIGHT_MAX : NODE_HEIGHT_MAX;

            const preferredWidth = Math.ceil(longestLineUnits * baseFontSize * 0.62 + horizontalPadding);
            const width = clamp(preferredWidth, minWidth, maxWidth);
            let fontSize = Math.min(
                baseFontSize,
                (width - horizontalPadding) / Math.max(longestLineUnits * 0.62, 1)
            );

            const lineHeightRatio = 1.34;
            const preferredHeight = Math.ceil(lines.length * fontSize * lineHeightRatio + verticalPadding);
            const height = clamp(preferredHeight, minHeight, maxHeight);
            fontSize = Math.min(
                fontSize,
                (height - verticalPadding) / Math.max(lines.length * lineHeightRatio, 1)
            );

            return {
                width,
                height,
                fontSize: Math.round(clamp(fontSize, isPpcm ? 12 : 11, baseFontSize)),
                margin: { top: 10, right: 16, bottom: 10, left: 16 }
            };
        }

        function getAdaptiveFontSize(nodeId) {
            return getNodeSizeProfile(nodeId).fontSize;
        }

        function getNodeWidth(nodeId) {
            return getNodeSizeProfile(nodeId).width;
        }

        function estimateNodeHeight(nodeId) {
            return getNodeSizeProfile(nodeId).height;
        }

        function getGraphViewport() {
            const container = document.getElementById('network');
            return {
                width: container?.clientWidth || window.innerWidth || 1200,
                height: container?.clientHeight || window.innerHeight || 800
            };
        }

        function getLayoutMetrics(nodeIds) {
            const viewport = getGraphViewport();
            const maxNodeWidth = Math.max(...nodeIds.map(getNodeWidth), NODE_WIDTH_MAX);
            const maxNodeHeight = Math.max(...nodeIds.map(estimateNodeHeight), NODE_HEIGHT_MAX);
            const radiusX = clamp(viewport.width * 0.38, maxNodeWidth * 1.75, 620);
            const radiusY = clamp(viewport.height * 0.36, maxNodeHeight * 2.05, 410);

            return {
                radiusX,
                radiusY,
                maxX: radiusX * 1.16,
                maxY: radiusY * 1.16
            };
        }

        function getPreferredNetworkSlot(nodeId) {
            const slotMap = {
                PPCM: { x: 0, y: 0, anchor: true },
                Residence_area: { x: 0.00, y: -1.00 },
                Sex: { x: 0.54, y: -0.84 },
                Education_level: { x: 0.91, y: -0.41 },
                Pension_insurance: { x: 0.99, y: 0.16 },
                Physical_exercise: { x: 0.74, y: 0.67 },
                Total_sleep_time: { x: 0.26, y: 0.97 },
                Solitary: { x: -0.31, y: 0.95 },
                BADL: { x: -0.78, y: 0.63 },
                Social_activity: { x: -0.99, y: 0.10 },
                Age: { x: -0.89, y: -0.45 },
                Region: { x: -0.50, y: -0.87 }
            };
            return slotMap[nodeId] || null;
        }

        function getFallbackNetworkSlot(index, count) {
            const angle = -Math.PI / 2 + index * ((Math.PI * 2) / Math.max(count, 1));
            return { x: Math.cos(angle), y: Math.sin(angle) };
        }

        function relaxNetworkLayout(nodeIds, positions, metrics) {
            const anchorNodeId = nodeIds.find(isPpcmNode);

            for (let pass = 0; pass < 10; pass += 1) {
                for (let i = 0; i < nodeIds.length; i += 1) {
                    for (let j = i + 1; j < nodeIds.length; j += 1) {
                        const a = nodeIds[i];
                        const b = nodeIds[j];
                        const aPos = positions[a];
                        const bPos = positions[b];
                        const minX = (getNodeWidth(a) + getNodeWidth(b)) / 2 + 34;
                        const minY = (estimateNodeHeight(a) + estimateNodeHeight(b)) / 2 + 26;
                        let dx = bPos.x - aPos.x;
                        let dy = bPos.y - aPos.y;

                        if (Math.abs(dx) < 0.01 && Math.abs(dy) < 0.01) {
                            dx = (j - i) * 0.8 || 0.8;
                            dy = (i + j) * 0.45 || 0.45;
                        }

                        if (Math.abs(dx) < minX && Math.abs(dy) < minY) {
                            const shareA = a === anchorNodeId ? 0 : (b === anchorNodeId ? 1 : 0.5);
                            const shareB = b === anchorNodeId ? 0 : (a === anchorNodeId ? 1 : 0.5);
                            const directionX = dx >= 0 ? 1 : -1;
                            const directionY = dy >= 0 ? 1 : -1;
                            const overlapX = minX - Math.abs(dx);
                            const overlapY = minY - Math.abs(dy);

                            if (overlapX < overlapY) {
                                const push = overlapX + 8;
                                aPos.x -= directionX * push * shareA;
                                bPos.x += directionX * push * shareB;
                            } else {
                                const push = overlapY + 8;
                                aPos.y -= directionY * push * shareA;
                                bPos.y += directionY * push * shareB;
                            }
                        }
                    }
                }

                for (const nodeId of nodeIds) {
                    if (nodeId === anchorNodeId) {
                        positions[nodeId] = { x: 0, y: 0 };
                        continue;
                    }
                    positions[nodeId].x = clamp(positions[nodeId].x, -metrics.maxX, metrics.maxX);
                    positions[nodeId].y = clamp(positions[nodeId].y, -metrics.maxY, metrics.maxY);
                }
            }
        }

        function computeDeterministicLayout(structData) {
            const nodeIds = structData.nodes.map(node => node.id);
            const metrics = getLayoutMetrics(nodeIds);
            const positions = {};

            nodeIds.forEach((nodeId, index) => {
                const slot = getPreferredNetworkSlot(nodeId) || getFallbackNetworkSlot(index, nodeIds.length);
                positions[nodeId] = {
                    x: slot.x * metrics.radiusX,
                    y: slot.y * metrics.radiusY
                };
            });

            relaxNetworkLayout(nodeIds, positions, metrics);
            return positions;
        }

        function buildInitialNode(node, position) {
            const sizeProfile = getNodeSizeProfile(node.id);
            return {
                id: node.id,
                label: allNodesInfo[node.id]?.name || node.label,
                title: node.id,
                x: position.x,
                y: position.y,
                fixed: { x: true, y: true },
                physics: false,
                shape: 'ellipse',
                font: {
                    size: sizeProfile.fontSize,
                    color: '#0f172a',
                    face: 'Segoe UI',
                    align: 'center',
                    multi: true
                },
                color: { background: isPpcmNode(node.id) ? '#fff7ed' : '#f5f9ff', border: isPpcmNode(node.id) ? '#b45309' : '#496a8f' },
                borderWidth: isPpcmNode(node.id) ? 3 : 2,
                margin: sizeProfile.margin,
                widthConstraint: { minimum: sizeProfile.width, maximum: sizeProfile.width },
                heightConstraint: { minimum: sizeProfile.height },
                shadow: { enabled: true, color: 'rgba(15,23,42,0.08)', size: 7, x: 0, y: 3 }
            };
        }

        async function initNetwork() {
            try {
                if (hasStaticData()) {
                    graphStructure = window.BAYES_DATA.structure;
                    allNodesInfo = window.BAYES_DATA.nodesInfo;
                } else {
                    const structResp = await fetch('/structure');
                    if (!structResp.ok) throw new Error('Failed to load structure');
                    graphStructure = await structResp.json();

                    const infoResp = await fetch('/nodes');
                    if (!infoResp.ok) throw new Error('Failed to load node info');
                    allNodesInfo = await infoResp.json();
                }

                const positions = computeDeterministicLayout(graphStructure);
                const nodes = graphStructure.nodes.map(node => buildInitialNode(node, positions[node.id]));
                const edges = graphStructure.edges.map(edge => ({
                    ...edge,
                    arrows: 'to',
                    color: { color: '#a8b6c8', highlight: '#1a2a4a' },
                    smooth: { type: 'continuous', roundness: 0.42 }
                }));

                nodesDataSet = new vis.DataSet(nodes);
                edgesDataSet = new vis.DataSet(edges);

                const container = document.getElementById('network');
                const options = {
                    nodes: {
                        shape: 'ellipse',
                        chosen: true
                    },
                    edges: {
                        arrows: { to: { enabled: true, scaleFactor: 0.8 } },
                        color: { color: '#a8b6c8', highlight: '#1a2a4a' },
                        smooth: { type: 'continuous', roundness: 0.42 }
                    },
                    physics: { enabled: false },
                    interaction: {
                        hover: true,
                        dragNodes: false,
                        navigationButtons: false,
                        tooltipDelay: 200
                    }
                };

                network = new vis.Network(container, { nodes: nodesDataSet, edges: edgesDataSet }, options);
                network.on('click', function(params) {
                    if (params.nodes.length > 0) openModal(params.nodes[0]);
                });

                await runInference();
                updateGraphColorsAndLabels();
                updateEvidenceList();
                fitReadableGraph();

                window.addEventListener('resize', function() {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(function() {
                        updateGraphColorsAndLabels();
                        if (network) fitReadableGraph();
                    }, 160);
                });
            } catch (e) {
                console.error(e);
                alert('Initialization failed: ' + e.message);
            }
        }

        function openModal(nodeId) {
            selectedNodeId = nodeId;
            const info = allNodesInfo[nodeId];
            if (!info) return;

            document.getElementById('modal-node-title').textContent = `Set Evidence: ${info.name}`;
            const container = document.getElementById('modal-states');
            container.innerHTML = '';

            const clearBtn = document.createElement('button');
            clearBtn.className = 'state-btn';
            clearBtn.textContent = 'Clear Evidence';
            clearBtn.style.color = '#b91c1c';
            clearBtn.onclick = function() {
                delete currentEvidence[nodeId];
                closeModal();
                applyEvidenceAndUpdate();
            };
            container.appendChild(clearBtn);

            info.outcomes.forEach(state => {
                const btn = document.createElement('button');
                btn.className = 'state-btn';
                btn.textContent = state;
                btn.onclick = function() {
                    currentEvidence[nodeId] = state;
                    closeModal();
                    applyEvidenceAndUpdate();
                };
                container.appendChild(btn);
            });

            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            selectedNodeId = null;
        }

        async function applyEvidenceAndUpdate() {
            await runInference();
            updateGraphColorsAndLabels();
            updateEvidenceList();
        }

        async function runInference() {
            try {
                if (hasStaticData()) {
                    lastResults = runStaticInference(currentEvidence);
                    displayResults(lastResults);
                    return;
                }

                const resp = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        evidence: currentEvidence,
                        target_nodes: Object.keys(allNodesInfo)
                    })
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.error || 'Inference failed');
                lastResults = data;
                displayResults(data);
            } catch (e) {
                document.getElementById('result-container').innerHTML = `<span style="color:#b91c1c;">Inference error: ${escapeHtml(e.message)}</span>`;
            }
        }

        function getStaticNodeProbability(nodeId, assignmentIndexes) {
            const outcomes = window.BAYES_DATA.nodesInfo[nodeId].outcomes;
            const parentIds = window.BAYES_DATA.parents[nodeId] || [];
            const definition = window.BAYES_DATA.definitions[nodeId];
            const childIndex = assignmentIndexes[nodeId];
            let parentConfigIndex = 0;
            let multiplier = 1;

            for (let index = parentIds.length - 1; index >= 0; index -= 1) {
                const parentId = parentIds[index];
                parentConfigIndex += assignmentIndexes[parentId] * multiplier;
                multiplier *= window.BAYES_DATA.nodesInfo[parentId].outcomes.length;
            }

            return definition[parentConfigIndex * outcomes.length + childIndex];
        }

        function runStaticInference(evidence) {
            const nodeIds = window.BAYES_DATA.nodeIds;
            const totals = {};
            const evidenceIndexes = {};
            let evidenceIsValid = true;
            let totalWeight = 0;

            for (const nodeId of nodeIds) {
                const outcomes = window.BAYES_DATA.nodesInfo[nodeId].outcomes;
                totals[nodeId] = Array(outcomes.length).fill(0);

                if (Object.prototype.hasOwnProperty.call(evidence, nodeId)) {
                    const outcomeIndex = outcomes.indexOf(evidence[nodeId]);
                    if (outcomeIndex === -1) evidenceIsValid = false;
                    evidenceIndexes[nodeId] = outcomeIndex;
                }
            }

            if (!evidenceIsValid) {
                return Object.fromEntries(nodeIds.map(nodeId => [nodeId, { error: 'Invalid evidence' }]));
            }

            const assignmentIndexes = {};

            function enumerate(position) {
                if (position === nodeIds.length) {
                    let jointProbability = 1;
                    for (const nodeId of nodeIds) {
                        jointProbability *= getStaticNodeProbability(nodeId, assignmentIndexes);
                    }

                    totalWeight += jointProbability;
                    for (const nodeId of nodeIds) {
                        totals[nodeId][assignmentIndexes[nodeId]] += jointProbability;
                    }
                    return;
                }

                const nodeId = nodeIds[position];
                const outcomes = window.BAYES_DATA.nodesInfo[nodeId].outcomes;
                const fixedEvidenceIndex = evidenceIndexes[nodeId];

                if (fixedEvidenceIndex !== undefined) {
                    assignmentIndexes[nodeId] = fixedEvidenceIndex;
                    enumerate(position + 1);
                    return;
                }

                for (let outcomeIndex = 0; outcomeIndex < outcomes.length; outcomeIndex += 1) {
                    assignmentIndexes[nodeId] = outcomeIndex;
                    enumerate(position + 1);
                }
            }

            enumerate(0);

            const results = {};
            for (const nodeId of nodeIds) {
                const outcomes = window.BAYES_DATA.nodesInfo[nodeId].outcomes;
                results[nodeId] = {};
                for (let index = 0; index < outcomes.length; index += 1) {
                    results[nodeId][outcomes[index]] = totalWeight > 0 ? totals[nodeId][index] / totalWeight : 0;
                }
            }

            return results;
        }

        function buildNodeLabel(nodeId, probs) {
            return getNodeLabelLines(nodeId, probs).join('\n');
        }

        function fitReadableGraph() {
            if (!network) return;
            const viewport = getGraphViewport();
            const padding = viewport.width >= 1000 ? 42 : 30;
            network.fit({ animation: false, padding });
            const scale = network.getScale();
            const minReadableScale = viewport.width >= 1000 ? 0.88 : 0.74;
            const maxComfortableScale = viewport.width >= 1000 ? 1.08 : 1.0;
            const targetScale = clamp(scale, minReadableScale, maxComfortableScale);
            if (Math.abs(targetScale - scale) > 0.01) {
                network.moveTo({ scale: targetScale, animation: false });
            }
        }

        function getMaxProbability(probs) {
            return Math.max(...Object.values(probs).map(value => Number(value) || 0), 0);
        }

        function updateGraphColorsAndLabels() {
            if (!nodesDataSet) return;

            const updates = [];
            const positions = graphStructure ? computeDeterministicLayout(graphStructure) : {};
            for (const nodeId of getOrderedResultNodeIds(lastResults)) {
                const probs = lastResults[nodeId];
                if (!probs || probs.error) continue;

                const isEvidence = !!currentEvidence[nodeId];
                const isPpcm = isPpcmNode(nodeId);
                const topProb = getMaxProbability(probs);
                const intensity = Math.max(0.15, topProb);
                const sizeProfile = getNodeSizeProfile(nodeId, probs);
                const bgColor = isPpcm
                    ? '#fff7ed'
                    : `rgb(${Math.round(245 - 52 * intensity)}, ${Math.round(249 - 48 * intensity)}, ${Math.round(255 - 36 * intensity)})`;

                updates.push({
                    id: nodeId,
                    label: buildNodeLabel(nodeId, probs),
                    color: {
                        background: bgColor,
                        border: isEvidence ? '#d97706' : (isPpcm ? '#b45309' : '#2a4a7a')
                    },
                    borderWidth: isEvidence ? 3 : 2,
                    font: {
                        size: sizeProfile.fontSize,
                        color: '#0f172a',
                        face: 'Segoe UI',
                        align: 'center',
                        multi: true,
                        bold: isEvidence || isPpcm
                    },
                    margin: sizeProfile.margin,
                    widthConstraint: { minimum: sizeProfile.width, maximum: sizeProfile.width },
                    heightConstraint: { minimum: sizeProfile.height },
                    x: positions[nodeId]?.x,
                    y: positions[nodeId]?.y,
                    fixed: { x: true, y: true },
                    physics: false
                });
            }
            nodesDataSet.update(updates);
            fitReadableGraph();
        }

        function displayResults(data) {
            const container = document.getElementById('result-container');
            const nodeIds = getOrderedResultNodeIds(data);
            if (nodeIds.length === 0) {
                container.innerHTML = '<span style="color:#8a9aaa;">No results</span>';
                return;
            }

            let html = '';
            for (const nodeId of nodeIds) {
                const probs = data[nodeId];
                if (!probs || probs.error) continue;

                const name = allNodesInfo[nodeId]?.name || nodeId;
                const isEvidence = !!currentEvidence[nodeId];
                const entries = getOutcomeEntries(nodeId, probs);

                html += `<div class="result-item">
                    <div class="r-node-name" onclick="handleResultClick('${escapeJsString(nodeId)}')">
                        ${escapeHtml(name)}${isEvidence ? ' [Evidence]' : ''}
                        <span class="click-hint">(click to set evidence)</span>
                    </div>`;

                for (const [outcome, probability] of entries) {
                    const p = Number(probability) || 0;
                    const pct = (p * 100).toFixed(1);
                    const width = Math.max(p * 100, 2);
                    html += `<div class="prob-row">
                        <span class="prob-label" title="${escapeHtml(outcome)}">${escapeHtml(outcome)}</span>
                        <div class="prob-track"><div class="prob-fill" style="width:${width}%;"></div></div>
                        <span class="prob-value">${pct}%</span>
                    </div>`;
                }
                html += '</div>';
            }
            container.innerHTML = html;
        }

        function handleResultClick(nodeId) {
            if (allNodesInfo[nodeId]) openModal(nodeId);
        }

        function updateEvidenceList() {
            const container = document.getElementById('evidence-list');
            const keys = Object.keys(currentEvidence);
            if (keys.length === 0) {
                container.innerHTML = '<span class="no-evidence">No evidence</span>';
                return;
            }

            let html = '';
            for (const nodeId of keys) {
                const state = currentEvidence[nodeId];
                const name = allNodesInfo[nodeId]?.name || nodeId;
                html += `<div class="evidence-item">
                    <span class="node-name">${escapeHtml(name)}</span>
                    <span><span class="state">${escapeHtml(state)}</span>
                    <span class="clear-ev" onclick="removeEvidence('${escapeJsString(nodeId)}')">x</span></span>
                </div>`;
            }
            container.innerHTML = html;
        }

        function removeEvidence(nodeId) {
            delete currentEvidence[nodeId];
            applyEvidenceAndUpdate();
        }

        function clearAllEvidence() {
            currentEvidence = {};
            applyEvidenceAndUpdate();
        }

        window.onload = initNetwork;
    </script>
</body>
</html>
